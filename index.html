<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarcodeStudio Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <!-- ══ TOPBAR ══════════════════════════════════════ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <span class="bar b1"></span><span class="bar b2"></span>
        <span class="bar b3"></span><span class="bar b4"></span>
        <span class="bar b5"></span>
      </div>
      <span class="brand-name">BarcodeStudio</span>
      <span class="brand-tag">PRO</span>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- ══ LAYOUT ══════════════════════════════════════ -->
  <div class="layout">

    <!-- ── LEFT: Generator ── -->
    <main class="panel panel-main">

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="barcode">Barcode</button>
        <button class="tab" data-tab="qr">QR Code</button>
        <button class="tab" data-tab="batch">Batch</button>
      </div>

      <!-- TAB: BARCODE -->
      <section class="tab-content active" id="tab-barcode">
        <div class="field-row">
          <div class="field">
            <label for="barcodeInput">Code / Number</label>
            <input type="text" id="barcodeInput" placeholder="e.g. 012345678905" autocomplete="off" spellcheck="false"/>
          </div>
          <div class="field field-sm">
            <label for="formatSelect">Format</label>
            <select id="formatSelect">
              <option value="auto">Auto Detect</option>
              <option value="CODE128">CODE128</option>
              <option value="EAN13">EAN-13</option>
              <option value="EAN8">EAN-8</option>
              <option value="UPC">UPC-A</option>
              <option value="CODE39">CODE39</option>
              <option value="ITF14">ITF-14</option>
              <option value="MSI">MSI</option>
            </select>
          </div>
        </div>

        <div class="section-title">Custom Label <span class="badge">optional</span></div>
        <div class="field-grid">
          <div class="field">
            <label for="labelName">Product Name</label>
            <input type="text" id="labelName" placeholder="e.g. Premium Rice 5kg"/>
          </div>
          <div class="field">
            <label for="labelPrice">Price</label>
            <input type="text" id="labelPrice" placeholder="e.g. ৳ 250"/>
          </div>
          <div class="field">
            <label for="labelDate">Date</label>
            <input type="date" id="labelDate"/>
          </div>
          <div class="field">
            <label for="labelNote">Extra Note</label>
            <input type="text" id="labelNote" placeholder="e.g. Batch #A1"/>
          </div>
        </div>

        <div class="section-title">Barcode Size</div>
        <div class="size-controls">
          <div class="size-item">
            <label>Bar Width <span class="val-badge" id="widthVal">2</span></label>
            <input type="range" id="barWidth" min="1" max="4" step="0.5" value="2"/>
          </div>
          <div class="size-item">
            <label>Bar Height <span class="val-badge" id="heightVal">80</span>px</label>
            <input type="range" id="barHeight" min="40" max="160" step="10" value="80"/>
          </div>
        </div>

        <button class="btn btn-generate" id="generateBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generate Barcode
        </button>
      </section>

      <!-- TAB: QR -->
      <section class="tab-content" id="tab-qr">
        <div class="field">
          <label for="qrInput">Text / URL / Data</label>
          <textarea id="qrInput" rows="4" placeholder="https://example.com&#10;or any text, phone, email..."></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="qrSize">QR Size</label>
            <select id="qrSize">
              <option value="128">Small (128px)</option>
              <option value="200" selected>Medium (200px)</option>
              <option value="256">Large (256px)</option>
              <option value="320">XL (320px)</option>
            </select>
          </div>
          <div class="field">
            <label for="qrError">Error Correction</label>
            <select id="qrError">
              <option value="L">L — 7%</option>
              <option value="M" selected>M — 15%</option>
              <option value="Q">Q — 25%</option>
              <option value="H">H — 30%</option>
            </select>
          </div>
        </div>
        <button class="btn btn-generate" id="generateQrBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="17" y="17" width="4" height="4"/></svg>
          Generate QR Code
        </button>
      </section>

      <!-- TAB: BATCH -->
      <section class="tab-content" id="tab-batch">
        <div class="field">
          <label for="batchInput">Barcode List <span class="hint-inline">— one per line</span></label>
          <textarea id="batchInput" rows="8" placeholder="012345678901&#10;012345678902&#10;ABC-001&#10;ABC-002"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="batchFormat">Format</label>
            <select id="batchFormat">
              <option value="auto">Auto Detect</option>
              <option value="CODE128">CODE128</option>
              <option value="EAN13">EAN-13</option>
              <option value="UPC">UPC-A</option>
            </select>
          </div>
          <div class="field">
            <label for="batchCols">Per Row</label>
            <select id="batchCols">
              <option value="1">1 column</option>
              <option value="2" selected>2 columns</option>
              <option value="3">3 columns</option>
            </select>
          </div>
        </div>
        <button class="btn btn-generate" id="generateBatchBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Generate All
        </button>
      </section>

    </main>

    <!-- ── RIGHT: Preview + History ── -->
    <aside class="panel panel-right">

      <div class="preview-header">
        <span class="section-label">Preview</span>
        <div class="preview-actions" id="previewActions" style="display:none">
          <button class="icon-btn" id="downloadPng" title="Download PNG">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PNG
          </button>
          <button class="icon-btn" id="downloadSvg" title="Download SVG">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            SVG
          </button>
          <button class="icon-btn icon-print" id="printBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print Sticker
          </button>
        </div>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-empty" id="previewEmpty">
          <div class="empty-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <p>Nothing generated yet</p>
        </div>
        <div class="sticker" id="stickerArea" style="display:none">
          <p class="sticker-name" id="stickerName"></p>
          <div id="barcodeHolder"><svg id="barcodeSvg"></svg></div>
          <div id="qrHolder" style="display:none"></div>
          <p class="sticker-code" id="stickerCode"></p>
          <div class="sticker-meta" id="stickerMeta">
            <span id="metaPrice"></span>
            <span id="metaDate"></span>
            <span id="metaNote"></span>
          </div>
        </div>
        <div class="batch-output" id="batchOutput" style="display:none"></div>
      </div>

      <div class="history-header">
        <span class="section-label">History</span>
        <button class="ghost-btn" id="clearHistory">Clear all</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="history-empty">Generated codes will appear here</p>
      </div>

    </aside>
  </div>

  <!-- ══ PRINT PREVIEW MODAL ═══════════════════════════ -->
  <div class="modal-overlay" id="printModal" style="display:none" role="dialog" aria-modal="true" aria-label="Print Settings">
    <div class="modal">

      <div class="modal-header">
        <div class="modal-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Settings
        </div>
        <button class="modal-close" id="closeModal" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">

        <!-- Left: Settings -->
        <div class="modal-settings">

          <!-- Sticker Size -->
          <div class="setting-group">
            <div class="setting-group-title">Sticker Size</div>
            <div class="preset-grid">
              <button class="preset-btn active" data-w="50" data-h="25">50×25 mm<span>Small label</span></button>
              <button class="preset-btn" data-w="100" data-h="50">100×50 mm<span>Medium label</span></button>
              <button class="preset-btn" data-w="210" data-h="148">A5<span>Half A4</span></button>
              <button class="preset-btn" data-w="210" data-h="297">A4<span>Full page</span></button>
            </div>
            <div class="custom-size-row">
              <div class="field">
                <label>Width (mm)</label>
                <input type="number" id="stickerW" value="50" min="20" max="300"/>
              </div>
              <div class="size-x">×</div>
              <div class="field">
                <label>Height (mm)</label>
                <input type="number" id="stickerH" value="25" min="10" max="420"/>
              </div>
              <div class="field field-sm">
                <label>Unit</label>
                <select id="stickerUnit">
                  <option value="mm" selected>mm</option>
                  <option value="in">inch</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Layout -->
          <div class="setting-group">
            <div class="setting-group-title">Layout</div>
            <div class="toggle-row">
              <label class="toggle-label">Orientation</label>
              <div class="seg-ctrl">
                <button class="seg active" data-orient="portrait">Portrait</button>
                <button class="seg" data-orient="landscape">Landscape</button>
              </div>
            </div>
            <div class="field-row" id="multiStickersRow">
              <div class="field">
                <label>Stickers per page</label>
                <select id="stickersPerPage">
                  <option value="1" selected>1 — Single</option>
                  <option value="10">10 per page</option>
                  <option value="20">20 per page</option>
                  <option value="24">24 per page</option>
                  <option value="batch">All (Batch)</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Printer -->
          <div class="setting-group">
            <div class="setting-group-title">Printer Type</div>
            <div class="printer-btns">
              <button class="printer-btn active" data-printer="thermal">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="8" width="16" height="10" rx="1"/><path d="M8 8V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v3"/><circle cx="17" cy="13" r="1"/><line x1="8" y1="16" x2="14" y2="16"/></svg>
                Thermal
              </button>
              <button class="printer-btn" data-printer="label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                Label
              </button>
              <button class="printer-btn" data-printer="a4">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                A4 / Normal
              </button>
            </div>
            <div class="field-row" style="margin-top:10px">
              <div class="field">
                <label>DPI / Resolution</label>
                <select id="dpiSelect">
                  <option value="203">203 dpi — Thermal standard</option>
                  <option value="300" selected>300 dpi — Label / laser</option>
                  <option value="600">600 dpi — High quality</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Margin & Border -->
          <div class="setting-group">
            <div class="setting-group-title">Margin &amp; Border</div>
            <div class="field-row">
              <div class="field">
                <label>Margin (mm)</label>
                <input type="number" id="marginSize" value="3" min="0" max="20"/>
              </div>
              <div class="field">
                <label>Border</label>
                <select id="borderStyle">
                  <option value="none">None</option>
                  <option value="solid">Solid line</option>
                  <option value="dashed">Dashed</option>
                </select>
              </div>
            </div>
            <div class="toggle-row">
              <label class="toggle-label">Cut / Crop marks</label>
              <label class="switch">
                <input type="checkbox" id="showCropMarks"/>
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <!-- Typography -->
          <div class="setting-group">
            <div class="setting-group-title">Typography</div>
            <div class="field-row">
              <div class="field">
                <label>Product name size</label>
                <select id="nameFontSize">
                  <option value="8">8pt — tiny</option>
                  <option value="10" selected>10pt — small</option>
                  <option value="12">12pt — medium</option>
                  <option value="14">14pt — large</option>
                </select>
              </div>
              <div class="field">
                <label>Code / meta size</label>
                <select id="codeFontSize">
                  <option value="6">6pt — tiny</option>
                  <option value="8" selected>8pt — small</option>
                  <option value="10">10pt — medium</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Logo -->
          <div class="setting-group">
            <div class="setting-group-title">Logo / Image <span class="badge">optional</span></div>
            <label class="file-upload-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload Logo (PNG/JPG)
              <input type="file" id="logoUpload" accept="image/*" style="display:none"/>
            </label>
            <div id="logoPreviewWrap" style="display:none">
              <img id="logoPreviewImg" alt="logo preview"/>
              <button class="ghost-btn" id="removeLogo">Remove</button>
            </div>
            <div class="field" id="logoSizeField" style="display:none">
              <label>Logo width (mm)</label>
              <input type="number" id="logoWidth" value="20" min="5" max="60"/>
            </div>
          </div>

        </div>

        <!-- Right: Live preview -->
        <div class="modal-preview-wrap">
          <div class="modal-preview-label">Print Preview</div>
          <div class="modal-preview-stage" id="previewStage">
            <div class="print-preview-sheet" id="printPreviewSheet">
              <!-- filled by JS -->
            </div>
          </div>
          <p class="preview-note" id="previewNote">50 × 25 mm · Portrait · Thermal</p>
        </div>

      </div><!-- /modal-body -->

      <div class="modal-footer">
        <button class="btn btn-ghost-sm" id="cancelPrint">Cancel</button>
        <button class="btn btn-generate" id="confirmPrint" style="width:auto;padding:0 28px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Send to Printer
        </button>
      </div>

    </div><!-- /modal -->
  </div><!-- /modal-overlay -->

  <!-- Hidden print frame -->
  <div id="printFrame" aria-hidden="true"></div>

</body>
</html>
