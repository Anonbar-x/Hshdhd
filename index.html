<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BarcodeStudio — Pro Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <!-- ── Top Bar ───────────────────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <span class="bar b1"></span><span class="bar b2"></span>
        <span class="bar b3"></span><span class="bar b4"></span>
        <span class="bar b5"></span>
      </div>
      <span class="brand-name">BarcodeStudio</span>
      <span class="brand-tag">PRO</span>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- ── Main Layout ───────────────────────────────── -->
  <div class="layout">

    <!-- ════ LEFT PANEL ════ -->
    <main class="panel panel-main">

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="barcode" role="tab">Barcode</button>
        <button class="tab" data-tab="qr" role="tab">QR Code</button>
        <button class="tab" data-tab="batch" role="tab">Batch</button>
      </div>

      <!-- ─ TAB: BARCODE ─ -->
      <section class="tab-content active" id="tab-barcode">

        <div class="field-row">
          <div class="field">
            <label for="barcodeInput">Code / Number</label>
            <input type="text" id="barcodeInput" placeholder="e.g. 012345678905" autocomplete="off" spellcheck="false"/>
          </div>
          <div class="field field-sm">
            <label for="formatSelect">Format</label>
            <select id="formatSelect">
              <option value="auto">Auto Detect</option>
              <option value="CODE128">CODE128</option>
              <option value="EAN13">EAN-13</option>
              <option value="EAN8">EAN-8</option>
              <option value="UPC">UPC-A</option>
              <option value="CODE39">CODE39</option>
              <option value="ITF14">ITF-14</option>
              <option value="MSI">MSI</option>
              <option value="pharmacode">Pharmacode</option>
            </select>
          </div>
        </div>

        <div class="section-title">Custom Label <span class="badge">optional</span></div>
        <div class="field-grid">
          <div class="field">
            <label for="labelName">Product Name</label>
            <input type="text" id="labelName" placeholder="e.g. Premium Rice 5kg"/>
          </div>
          <div class="field">
            <label for="labelPrice">Price</label>
            <input type="text" id="labelPrice" placeholder="e.g. ৳ 250"/>
          </div>
          <div class="field">
            <label for="labelDate">Date</label>
            <input type="date" id="labelDate"/>
          </div>
          <div class="field">
            <label for="labelNote">Extra Note</label>
            <input type="text" id="labelNote" placeholder="e.g. Batch #A1"/>
          </div>
        </div>

        <div class="section-title">Size & Style</div>
        <div class="size-controls">
          <div class="size-item">
            <label>Bar Width &nbsp;<span class="val-badge" id="widthVal">2</span></label>
            <input type="range" id="barWidth" min="1" max="4" step="0.5" value="2"/>
          </div>
          <div class="size-item">
            <label>Bar Height &nbsp;<span class="val-badge" id="heightVal">80</span>px</label>
            <input type="range" id="barHeight" min="40" max="160" step="10" value="80"/>
          </div>
        </div>

        <button class="btn btn-generate" id="generateBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generate Barcode
        </button>

      </section>

      <!-- ─ TAB: QR CODE ─ -->
      <section class="tab-content" id="tab-qr">
        <div class="field">
          <label for="qrInput">Text / URL / Data</label>
          <textarea id="qrInput" rows="4" placeholder="https://example.com&#10;or any text / phone / email..."></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="qrSize">QR Size</label>
            <select id="qrSize">
              <option value="128">Small (128 px)</option>
              <option value="200" selected>Medium (200 px)</option>
              <option value="256">Large (256 px)</option>
              <option value="320">XL (320 px)</option>
            </select>
          </div>
          <div class="field">
            <label for="qrError">Error Correction</label>
            <select id="qrError">
              <option value="L">L — 7%</option>
              <option value="M" selected>M — 15%</option>
              <option value="Q">Q — 25%</option>
              <option value="H">H — 30%</option>
            </select>
          </div>
        </div>
        <button class="btn btn-generate" id="generateQrBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="17" y="17" width="4" height="4"/></svg>
          Generate QR Code
        </button>
      </section>

      <!-- ─ TAB: BATCH ─ -->
      <section class="tab-content" id="tab-batch">
        <div class="field">
          <label for="batchInput">Barcode List <span class="hint-inline">— one per line</span></label>
          <textarea id="batchInput" rows="8" placeholder="012345678901&#10;012345678902&#10;012345678903&#10;ABC-001&#10;ABC-002"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="batchFormat">Format</label>
            <select id="batchFormat">
              <option value="auto">Auto Detect</option>
              <option value="CODE128">CODE128</option>
              <option value="EAN13">EAN-13</option>
              <option value="UPC">UPC-A</option>
            </select>
          </div>
          <div class="field">
            <label for="batchCols">Per Row</label>
            <select id="batchCols">
              <option value="1">1 column</option>
              <option value="2" selected>2 columns</option>
              <option value="3">3 columns</option>
            </select>
          </div>
        </div>
        <button class="btn btn-generate" id="generateBatchBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Generate All
        </button>
      </section>

    </main>

    <!-- ════ RIGHT PANEL ════ -->
    <aside class="panel panel-right">

      <!-- Preview header -->
      <div class="preview-header">
        <span class="section-label">Preview</span>
        <div class="preview-actions" id="previewActions" style="display:none">
          <button class="icon-btn" id="downloadPng" title="Download PNG">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PNG
          </button>
          <button class="icon-btn" id="downloadSvg" title="Download SVG">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            SVG
          </button>
          <button class="icon-btn icon-print" id="printBtn" title="Print Sticker">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print
          </button>
        </div>
      </div>

      <!-- Preview box / sticker area -->
      <div class="preview-box" id="previewBox">
        <div class="preview-empty" id="previewEmpty">
          <div class="empty-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <p>Nothing generated yet</p>
        </div>

        <!-- Single barcode sticker -->
        <div class="sticker" id="stickerArea" style="display:none">
          <p class="sticker-name" id="stickerName"></p>
          <div id="barcodeHolder"><svg id="barcodeSvg"></svg></div>
          <div id="qrHolder" style="display:none"></div>
          <p class="sticker-code" id="stickerCode"></p>
          <div class="sticker-meta" id="stickerMeta">
            <span id="metaPrice"></span>
            <span id="metaDate"></span>
            <span id="metaNote"></span>
          </div>
        </div>

        <!-- Batch output grid -->
        <div class="batch-output" id="batchOutput" style="display:none"></div>
      </div>

      <!-- History -->
      <div class="history-header">
        <span class="section-label">History</span>
        <button class="ghost-btn" id="clearHistory">Clear all</button>
      </div>
      <div class="history-list" id="historyList">
        <p class="history-empty">Generated codes will appear here</p>
      </div>

    </aside>
  </div>

  <!-- Hidden print container -->
  <div id="printFrame" aria-hidden="true"></div>

</body>
</html>
