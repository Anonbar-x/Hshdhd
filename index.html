<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Generator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="page-wrap">

    <header class="header">
      <div class="logo-mark">▊</div>
      <h1>Barcode Generator</h1>
      <p class="subtitle">Generate & print product barcodes instantly</p>
    </header>

    <main class="card">

      <div class="input-group">
        <label for="barcodeInput">Product Code / Barcode Number</label>
        <div class="input-row">
          <input
            type="text"
            id="barcodeInput"
            placeholder="e.g. 012345678905"
            maxlength="48"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="generateBtn" class="btn btn-primary">
            <span class="btn-icon">⟳</span> Generate
          </button>
        </div>
        <p class="hint">Supports CODE128, EAN-13, UPC-A and more</p>
      </div>

      <!-- Preview -->
      <div class="preview-wrap" id="previewWrap">
        <div class="preview-empty" id="previewEmpty">
          <div class="empty-icon">⬛</div>
          <span>Your barcode will appear here</span>
        </div>

        <!-- Print sticker zone -->
        <div class="sticker" id="stickerArea" style="display:none;">
          <svg id="barcodeSvg"></svg>
          <p class="sticker-code" id="stickerCode"></p>
        </div>
      </div>

      <div class="actions" id="actionsRow" style="display:none;">
        <button id="printBtn" class="btn btn-secondary">
          <span class="btn-icon">⎙</span> Print Sticker
        </button>
        <button id="resetBtn" class="btn btn-ghost">
          Clear
        </button>
      </div>

    </main>

    <footer class="footer">
      Works with thermal, label &amp; A4 printers &nbsp;·&nbsp; No data sent to any server
    </footer>

  </div>

</body>
</html>
